<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Evaluación Psicométrica — Supervisor IT</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#7c3aed;--accent2:#6d28d9;--accent-light:#ede9fe;
  --bg:#f8fafc;--surface:#fff;--border:#e2e8f0;
  --text:#1e293b;--muted:#64748b;--font:'Segoe UI',system-ui,sans-serif
}
body{
  background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#4c1d95 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:var(--font);padding:24px
}
.card{
  background:var(--surface);border-radius:20px;padding:48px 40px;
  width:100%;max-width:480px;box-shadow:0 24px 60px rgba(0,0,0,.35);
  text-align:center
}
.logo{
  width:68px;height:68px;background:var(--accent);border-radius:18px;
  display:inline-flex;align-items:center;justify-content:center;margin-bottom:24px;
  box-shadow:0 8px 24px rgba(124,58,237,.45)
}
.logo svg{width:36px;height:36px;stroke:#fff;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
h1{font-size:22px;font-weight:800;color:var(--text);margin-bottom:8px}
.subtitle{font-size:14px;color:var(--muted);margin-bottom:32px;line-height:1.6}
.divider{height:1px;background:var(--border);margin:28px 0}
.btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:15px 20px;border-radius:12px;font-size:15px;font-weight:600;
  cursor:pointer;border:none;text-decoration:none;transition:all .18s;font-family:var(--font);
  margin-bottom:12px
}
.btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(124,58,237,.35)}
.btn-primary:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.4)}
.btn-secondary{background:var(--bg);color:var(--muted);border:1.5px solid var(--border)}
.btn-secondary:hover{background:var(--accent-light);color:var(--accent);border-color:#c4b5fd}
.note{font-size:12px;color:var(--muted);line-height:1.7;margin-top:8px}
.badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--accent-light);color:var(--accent);
  font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
  margin-bottom:20px;text-transform:uppercase;letter-spacing:.5px
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
  </div>
  <div class="badge">
    <svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg>
    Evaluación Psicométrica
  </div>
  <h1>Evaluación de Competencias</h1>
  <p class="subtitle">Proceso de selección para el puesto de<br><strong>Supervisor IT</strong></p>

  <a class="btn btn-primary" href="evaluador.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Soy evaluador — Acceder al panel
  </a>

  <div class="divider"></div>

  <a class="btn btn-secondary" href="candidato.html">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Tengo un link de evaluación
  </a>
  <p class="note">Si eres candidato/a, usa el link específico que te envió el evaluador.</p>
</div>
</body>
</html>
